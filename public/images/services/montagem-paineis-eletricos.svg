  <rect x="243" y="100" width="14" height="18" rx="2" fill="#2a3a55"/>
  <rect x="277" y="100" width="14" height="18" rx="2" fill="#C4561E"/>
  <rect x="311" y="100" width="14" height="18" rx="2" fill="#C4561E"/>
