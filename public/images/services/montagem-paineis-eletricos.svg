    <rect x="231" y="308" width="9" height="8" rx="1" fill="#C4561E"/>
    <rect x="249" y="308" width="9" height="8" rx="1" fill="#4a9aff"/>
    <rect x="267" y="308" width="9" height="8" rx="1" fill="#4a9aff"/>
    <rect x="285" y="308" width="9" height="8" rx="1" fill="#aaff00"/>
    <rect x="303" y="308" width="9" height="8" rx="1" fill="#aaa"/>
    <rect x="321" y="308" width="9" height="8" rx="1" fill="#aaa"/>
    <rect x="339" y="308" width="9" height="8" rx="1" fill="#C4561E"/>
    <rect x="357" y="308" width="9" height="8" rx="1" fill="#4a9aff"/>
    <rect x="375" y="308" width="9" height="8" rx="1" fill="#aaff00"/>
    <rect x="393" y="308" width="9" height="8" rx="1" fill="#aaa"/>
