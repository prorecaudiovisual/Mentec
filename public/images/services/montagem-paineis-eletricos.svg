<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c18"/>
      <stop offset="100%" style="stop-color:#0f1828"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Panel enclosure -->
  <rect x="80" y="50" width="360" height="370" rx="5" fill="#111f35" stroke="#2a3a55" stroke-width="3"/>
  <rect x="88" y="58" width="344" height="354" rx="3" fill="#0c1828" stroke="#1a2840" stroke-width="1"/>

  <!-- DIN rail 1 - top section -->
  <rect x="96" y="76" width="328" height="6" rx="1" fill="#1e3050"/>
  <!-- Breakers on rail 1 - Main -->
  <g fill="#0a1525" stroke="#C4561E" stroke-width="1.5">
    <rect x="100" y="88" width="50" height="65" rx="2"/>
  </g>
  <text x="125" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#C4561E">GERAL</text>
  <rect x="115" y="108" width="20" height="28" rx="3" fill="#C4561E"/>
  <rect x="118" y="135" width="14" height="18" rx="1" fill="#a03a10"/>

  <!-- Branch breakers row 1 -->
  <g fill="#0a1525" stroke="#2a3a55" stroke-width="1">
