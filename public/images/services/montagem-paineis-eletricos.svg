  <text x="620" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#C4561E" letter-spacing="2">PAINÉIS ELÉTRICOS</text>
  <line x1="490" y1="90" x2="750" y2="90" stroke="#1a2840" stroke-width="1"/>

  <!-- Feature list -->
  <g font-family="monospace" font-size="9">
    <text x="495" y="115" fill="#4a9aff">▸</text><text x="508" y="115" fill="#aaa">Disjuntores termomagn.</text>
    <text x="495" y="135" fill="#4a9aff">▸</text><text x="508" y="135" fill="#aaa">Contatores industriais</text>
    <text x="495" y="155" fill="#4a9aff">▸</text><text x="508" y="155" fill="#aaa">CLPs Siemens / WEG</text>
    <text x="495" y="175" fill="#4a9aff">▸</text><text x="508" y="175" fill="#aaa">Relés de proteção</text>
    <text x="495" y="195" fill="#4a9aff">▸</text><text x="508" y="195" fill="#aaa">Blocos de terminais</text>
    <text x="495" y="215" fill="#4a9aff">▸</text><text x="508" y="215" fill="#aaa">Cabeamento estruturado</text>
    <text x="495" y="235" fill="#4a9aff">▸</text><text x="508" y="235" fill="#aaa">Automação industrial</text>
    <text x="495" y="255" fill="#4a9aff">▸</text><text x="508" y="255" fill="#aaa">Norma NBR-5410</text>
  </g>

  <line x1="490" y1="268" x2="750" y2="268" stroke="#1a2840" stroke-width="1"/>

  <!-- Status badges -->
  <rect x="495" y="280" width="100" height="24" rx="3" fill="#0d2010" stroke="#2a4a20" stroke-width="1"/>
  <text x="545" y="296" text-anchor="middle" font-family="monospace" font-size="9" fill="#aaff00">PROJETADO</text>
  <rect x="605" y="280" width="130" height="24" rx="3" fill="#0d1020" stroke="#C4561E" stroke-width="1"/>
  <text x="670" y="296" text-anchor="middle" font-family="monospace" font-size="9" fill="#C4561E">CERTIFICADO ABNT</text>
  <rect x="495" y="312" width="100" height="24" rx="3" fill="#0a1a30" stroke="#1a3a5a" stroke-width="1"/>
  <text x="545" y="328" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a9aff">MONTADO</text>
  <rect x="605" y="312" width="130" height="24" rx="3" fill="#0d1828" stroke="#2a4a6a" stroke-width="1"/>
  <text x="670" y="328" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a9aff">TESTADO EM FÁBRICA</text>

  <!-- Bottom label -->
  <rect x="0" y="430" width="800" height="50" fill="#060c18" opacity="0.9"/>
  <text x="400" y="461" text-anchor="middle" font-family="monospace" font-size="13" fill="#aaff00" letter-spacing="3">PAINÉIS ELÉTRICOS · AUTOMAÇÃO</text>
</svg>