    <rect x="202" y="88" width="28" height="65" rx="2"/>
    <rect x="236" y="88" width="28" height="65" rx="2"/>
    <rect x="270" y="88" width="28" height="65" rx="2"/>
    <rect x="304" y="88" width="28" height="65" rx="2"/>
    <rect x="338" y="88" width="28" height="65" rx="2"/>
    <rect x="372" y="88" width="28" height="65" rx="2" stroke="#C4561E"/>
  </g>
  <!-- Handles -->
  <rect x="175" y="100" width="14" height="18" rx="2" fill="#C4561E"/>
