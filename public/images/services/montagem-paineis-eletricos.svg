  <text x="232" y="240" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7aaa">KM3</text>
  <text x="287" y="240" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7aaa">KM4</text>
  <text x="342" y="240" text-anchor="middle" font-family="monospace" font-size="7" fill="#C4561E">KM5</text>

