    <rect x="228" y="303" width="15" height="70" rx="1"/>
    <rect x="246" y="303" width="15" height="70" rx="1"/>
    <rect x="264" y="303" width="15" height="70" rx="1"/>
    <rect x="282" y="303" width="15" height="70" rx="1"/>
    <rect x="300" y="303" width="15" height="70" rx="1"/>
    <rect x="318" y="303" width="15" height="70" rx="1"/>
    <rect x="336" y="303" width="15" height="70" rx="1"/>
    <rect x="354" y="303" width="15" height="70" rx="1"/>
    <rect x="372" y="303" width="15" height="70" rx="1"/>
    <rect x="390" y="303" width="15" height="70" rx="1"/>
