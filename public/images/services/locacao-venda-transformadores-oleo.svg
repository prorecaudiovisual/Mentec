<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c16"/>
      <stop offset="100%" style="stop-color:#0e1825"/>
    </linearGradient>
    <linearGradient id="tank-body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e2e44"/>
      <stop offset="30%" style="stop-color:#2a3e58"/>
      <stop offset="70%" style="stop-color:#2a3e58"/>
      <stop offset="100%" style="stop-color:#1e2e44"/>
    </linearGradient>
    <linearGradient id="oil-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a4010;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#3a2808;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1" opacity="0.4">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="480"/><line x1="160" y1="0" x2="160" y2="480"/>
    <line x1="240" y1="0" x2="240" y2="480"/><line x1="320" y1="0" x2="320" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="480"/><line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="560" y1="0" x2="560" y2="480"/><line x1="640" y1="0" x2="640" y2="480"/>
  </g>

  <!-- Base skid -->
  <rect x="120" y="370" width="360" height="30" rx="3" fill="#141e30" stroke="#2a3a50" stroke-width="2"/>
  <rect x="145" y="365" width="30" height="15" rx="2" fill="#1a2840"/>
  <rect x="420" y="365" width="30" height="15" rx="2" fill="#1a2840"/>

  <!-- Main oil tank body -->
  <rect x="150" y="150" width="300" height="220" rx="6" fill="url(#tank-body)" stroke="#3a5070" stroke-width="2.5"/>

  <!-- Oil level indicator (sight glass) -->
  <rect x="442" y="200" width="16" height="120" rx="3" fill="#0a1828" stroke="#2a4a6a" stroke-width="1.5"/>
  <!-- Oil fill level -->
  <rect x="444" y="260" width="12" height="58" rx="2" fill="#5a4010" opacity="0.7"/>
  <line x1="442" y1="260" x2="458" y2="260" stroke="#ffaa00" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="465" y="264" font-family="monospace" font-size="8" fill="#ffaa00">NÍVEL</text>

  <!-- Cooling fins/radiators -->
  <g fill="#162030" stroke="#2a3a50" stroke-width="1">
    <!-- Left radiators -->
    <rect x="110" y="175" width="42" height="170" rx="2"/>
    <rect x="118" y="180" width="26" height="160" rx="1" fill="#0d1828"/>
    <!-- Fin dividers -->
    <line x1="110" y1="210" x2="152" y2="210" stroke="#1e3050"/><line x1="110" y1="240" x2="152" y2="240" stroke="#1e3050"/>
    <line x1="110" y1="270" x2="152" y2="270" stroke="#1e3050"/><line x1="110" y1="300" x2="152" y2="300" stroke="#1e3050"/>
    <line x1="110" y1="330" x2="152" y2="330" stroke="#1e3050"/>
    <!-- Right radiators -->
    <rect x="448" y="175" width="42" height="170" rx="2"/>
    <rect x="456" y="180" width="26" height="160" rx="1" fill="#0d1828"/>
    <line x1="448" y1="210" x2="490" y2="210" stroke="#1e3050"/><line x1="448" y1="240" x2="490" y2="240" stroke="#1e3050"/>
    <line x1="448" y1="270" x2="490" y2="270" stroke="#1e3050"/><line x1="448" y1="300" x2="490" y2="300" stroke="#1e3050"/>
    <line x1="448" y1="330" x2="490" y2="330" stroke="#1e3050"/>
  </g>

  <!-- Tank cover top -->
  <rect x="148" y="138" width="304" height="18" rx="4" fill="#2a3e58" stroke="#3a5070" stroke-width="2"/>

  <!-- Oil conservator tank on top -->
  <ellipse cx="300" cy="115" rx="60" ry="20" fill="#1e2e44" stroke="#3a5070" stroke-width="2"/>
  <rect x="240" y="95" width="120" height="25" rx="4" fill="#1e2e44" stroke="#3a5070" stroke-width="2"/>
  <line x1="300" y1="120" x2="300" y2="138" stroke="#3a5070" stroke-width="3"/>

  <!-- HV Bushings top -->
  <g fill="#2a4060" stroke="#3a5a80" stroke-width="1.5">
    <!-- Phase A -->
    <rect x="210" y="60" width="22" height="85" rx="4"/>
    <!-- Ribs -->
    <ellipse cx="221" cy="70" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="221" cy="82" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="221" cy="94" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="221" cy="106" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="221" cy="118" rx="14" ry="5" fill="#1a3050"/>
    <!-- Phase B -->
    <rect x="289" y="50" width="22" height="95" rx="4"/>
    <ellipse cx="300" cy="60" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="300" cy="72" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="300" cy="84" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="300" cy="96" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="300" cy="108" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="300" cy="120" rx="14" ry="5" fill="#1a3050"/>
    <!-- Phase C -->
    <rect x="368" y="60" width="22" height="85" rx="4"/>
    <ellipse cx="379" cy="70" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="379" cy="82" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="379" cy="94" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="379" cy="106" rx="14" ry="5" fill="#1a3050"/>
    <ellipse cx="379" cy="118" rx="14" ry="5" fill="#1a3050"/>
  </g>

  <!-- HV terminal caps glowing -->
  <circle cx="221" cy="58" r="6" fill="#C4561E" filter="url(#glow)"/>
  <circle cx="300" cy="48" r="6" fill="#C4561E" filter="url(#glow)"/>
  <circle cx="379" cy="58" r="6" fill="#C4561E" filter="url(#glow)"/>

  <!-- LV Bushings side (low voltage, smaller) -->
  <g fill="#1a3050" stroke="#2a4a70" stroke-width="1.5">
    <rect x="155" y="200" width="16" height="60" rx="3"/>
    <ellipse cx="163" cy="205" rx="10" ry="4" fill="#0d2040"/>
    <ellipse cx="163" cy="218" rx="10" ry="4" fill="#0d2040"/>
    <ellipse cx="163" cy="231" rx="10" ry="4" fill="#0d2040"/>
    <ellipse cx="163" cy="244" rx="10" ry="4" fill="#0d2040"/>
  </g>

  <!-- Nameplate on tank -->
  <rect x="230" y="220" width="140" height="80" rx="3" fill="#0a1828" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="300" y="240" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a8aaa">MENTEC TRAFO</text>
  <line x1="238" y1="246" x2="362" y2="246" stroke="#1a3a5a" stroke-width="1"/>
  <text x="238" y="260" font-family="monospace" font-size="8" fill="#2a4a6a">kVA</text>
  <text x="362" y="260" text-anchor="end" font-family="monospace" font-size="10" fill="#C4561E">500</text>
  <text x="238" y="276" font-family="monospace" font-size="8" fill="#2a4a6a">HV</text>
  <text x="362" y="276" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">13.800 V</text>
  <text x="238" y="292" font-family="monospace" font-size="8" fill="#2a4a6a">LV</text>
  <text x="362" y="292" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">380/220 V</text>

  <!-- Drain valve -->
  <rect x="275" y="360" width="50" height="15" rx="2" fill="#142030" stroke="#2a3a50" stroke-width="1"/>
  <rect x="293" y="370" width="14" height="12" rx="1" fill="#1a3050"/>

  <!-- Info panel right -->
  <rect x="570" y="80" width="190" height="280" rx="6" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
  <text x="665" y="102" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a9aff" letter-spacing="1">TRAFO A ÓLEO</text>
  <line x1="578" y1="110" x2="752" y2="110" stroke="#1a2840" stroke-width="1"/>
  <text x="578" y="130" font-family="monospace" font-size="9" fill="#4a7aaa">TIPO</text>
  <text x="752" y="130" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">IMERSO EM ÓLEO</text>
  <text x="578" y="150" font-family="monospace" font-size="9" fill="#4a7aaa">INSTALAÇÃO</text>
  <text x="752" y="150" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">OUTDOOR</text>
  <text x="578" y="170" font-family="monospace" font-size="9" fill="#4a7aaa">POTÊNCIA</text>
  <text x="752" y="170" text-anchor="end" font-family="monospace" font-size="11" fill="#4a9aff">15–2500 kVA</text>
  <text x="578" y="190" font-family="monospace" font-size="9" fill="#4a7aaa">TENSÃO HV</text>
  <text x="752" y="190" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">13,8 kV</text>
  <text x="578" y="210" font-family="monospace" font-size="9" fill="#4a7aaa">TENSÃO LV</text>
  <text x="752" y="210" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">380/220 V</text>
  <text x="578" y="230" font-family="monospace" font-size="9" fill="#4a7aaa">NORMA</text>
  <text x="752" y="230" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">NBR 5356</text>
  <text x="578" y="250" font-family="monospace" font-size="9" fill="#4a7aaa">ELEVAÇÃO T°</text>
  <text x="752" y="250" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">55°C ou 65°C</text>
  <line x1="578" y1="262" x2="752" y2="262" stroke="#1a2840" stroke-width="1"/>
  <rect x="578" y="272" width="78" height="22" rx="3" fill="#0a1a30" stroke="#1a3a5a" stroke-width="1"/>
  <text x="617" y="287" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a9aff">OUTDOOR</text>
  <rect x="662" y="272" width="82" height="22" rx="3" fill="#100a00" stroke="#5a3a10" stroke-width="1"/>
  <text x="703" y="287" text-anchor="middle" font-family="monospace" font-size="8" fill="#C4561E">ALTA POTÊNCIA</text>
  <rect x="578" y="300" width="164" height="22" rx="3" fill="#0d1a10" stroke="#2a4a20" stroke-width="1"/>
  <text x="660" y="315" text-anchor="middle" font-family="monospace" font-size="8" fill="#aaff00">REDES DISTRIBUIÇÃO</text>

  <!-- Bottom label -->
  <rect x="0" y="430" width="800" height="50" fill="#060c16" opacity="0.9"/>
  <text x="400" y="461" text-anchor="middle" font-family="monospace" font-size="13" fill="#4a9aff" letter-spacing="3">TRANSFORMADOR A ÓLEO · OUTDOOR</text>
</svg>