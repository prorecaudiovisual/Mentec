<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c18"/>
      <stop offset="100%" style="stop-color:#0e1828"/>
    </linearGradient>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e2e44"/>
      <stop offset="50%" style="stop-color:#2a3e58"/>
      <stop offset="100%" style="stop-color:#1e2e44"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strong-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#0d1828" stroke-width="1" opacity="0.4">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>

  <!-- Main breaker body - center -->
  <rect x="200" y="100" width="240" height="280" rx="6" fill="url(#body-grad)" stroke="#3a5070" stroke-width="3"/>
  <rect x="210" y="112" width="220" height="256" rx="4" fill="#0c1828" stroke="#1a3050" stroke-width="1.5"/>

  <!-- Front panel -->
  <rect x="218" y="120" width="204" height="240" rx="3" fill="#0a1525"/>

  <!-- Manufacturer plate -->
  <rect x="228" y="130" width="184" height="30" rx="2" fill="#061020" stroke="#1a3a5a" stroke-width="1"/>
  <text x="320" y="144" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a8aaa">DISJUNTOR MÉDIA TENSÃO</text>
  <text x="320" y="156" text-anchor="middle" font-family="monospace" font-size="8" fill="#2a4a6a">17,5 kV — 630 A</text>

  <!-- Vacuum interrupter chambers (3 poles visible) -->
  <!-- Pole A -->
  <rect x="235" y="170" width="50" height="110" rx="6" fill="#0a1828" stroke="#C4561E" stroke-width="2"/>
  <!-- Vacuum bottle -->
  <rect x="243" y="178" width="34" height="94" rx="4" fill="#050e1a" stroke="#1a3050" stroke-width="1.5"/>
  <!-- Arc extinguishing media (vacuum) -->
  <ellipse cx="260" cy="210" rx="13" ry="18" fill="#030810" stroke="#0d2040" stroke-width="1"/>
  <ellipse cx="260" cy="210" rx="7" ry="10" fill="#020510" stroke="#0a1828" stroke-width="1"/>
  <!-- Moving contact indicator -->
  <line x1="260" y1="178" x2="260" y2="195" stroke="#C4561E" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Fixed contact -->
  <line x1="260" y1="225" x2="260" y2="270" stroke="#C4561E" stroke-width="2.5"/>
  <!-- Gap (contact open) -->
  <line x1="253" y1="218" x2="267" y2="218" stroke="#ffaa00" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="260" y="254" text-anchor="middle" font-family="monospace" font-size="7" fill="#C4561E">FASE A</text>

  <!-- Pole B -->
  <rect x="295" y="170" width="50" height="110" rx="6" fill="#0a1828" stroke="#C4561E" stroke-width="2"/>
  <rect x="303" y="178" width="34" height="94" rx="4" fill="#050e1a" stroke="#1a3050" stroke-width="1.5"/>
  <ellipse cx="320" cy="210" rx="13" ry="18" fill="#030810" stroke="#0d2040" stroke-width="1"/>
  <ellipse cx="320" cy="210" rx="7" ry="10" fill="#020510" stroke="#0a1828" stroke-width="1"/>
  <line x1="320" y1="178" x2="320" y2="198" stroke="#C4561E" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="320" y1="225" x2="320" y2="270" stroke="#C4561E" stroke-width="2.5"/>
  <text x="320" y="254" text-anchor="middle" font-family="monospace" font-size="7" fill="#C4561E">FASE B</text>

  <!-- Pole C -->
  <rect x="355" y="170" width="50" height="110" rx="6" fill="#0a1828" stroke="#C4561E" stroke-width="2"/>
  <rect x="363" y="178" width="34" height="94" rx="4" fill="#050e1a" stroke="#1a3050" stroke-width="1.5"/>
  <ellipse cx="380" cy="210" rx="13" ry="18" fill="#030810" stroke="#0d2040" stroke-width="1"/>
  <ellipse cx="380" cy="210" rx="7" ry="10" fill="#020510" stroke="#0a1828" stroke-width="1"/>
  <line x1="380" y1="178" x2="380" y2="196" stroke="#C4561E" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="380" y1="225" x2="380" y2="270" stroke="#C4561E" stroke-width="2.5"/>
  <text x="380" y="254" text-anchor="middle" font-family="monospace" font-size="7" fill="#C4561E">FASE C</text>

  <!-- Mechanism section -->
  <rect x="228" y="290" width="184" height="60" rx="3" fill="#061020" stroke="#1a2840" stroke-width="1"/>
  <text x="320" y="308" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">MECANISMO DE ACIONAMENTO</text>
  <!-- Spring mechanism indicator -->
  <path d="M248,330 Q258,318 268,330 Q278,342 288,330 Q298,318 308,330" fill="none" stroke="#C4561E" stroke-width="2"/>
  <!-- Charged indicator -->
  <rect x="320" y="318" width="50" height="18" rx="2" fill="#0a2010" stroke="#aaff00" stroke-width="1"/>
  <text x="345" y="330" text-anchor="middle" font-family="monospace" font-size="7" fill="#aaff00">TENSIONADO</text>

  <!-- Lifting lug top -->
  <rect x="290" y="90" width="60" height="15" rx="3" fill="#1e2e44" stroke="#3a5070" stroke-width="1.5"/>
  <path d="M300,90 Q320,75 340,90" fill="none" stroke="#3a5070" stroke-width="2"/>

  <!-- Left panel - diagnostics -->
  <rect x="40" y="80" width="145" height="320" rx="6" fill="#08111e" stroke="#1a2840" stroke-width="1.5"/>
  <text x="112" y="102" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a7aaa">DIAGNÓSTICO</text>
  <line x1="50" y1="110" x2="176" y2="110" stroke="#1a2840" stroke-width="1"/>

  <text x="50" y="130" font-family="monospace" font-size="8" fill="#4a7aaa">ISOLAÇÃO</text>
  <rect x="50" y="135" width="115" height="14" rx="2" fill="#0a1828"/>
  <rect x="50" y="135" width="100" height="14" rx="2" fill="#0d3a10"/>
  <text x="170" y="147" text-anchor="end" font-family="monospace" font-size="8" fill="#aaff00">OK</text>

  <text x="50" y="165" font-family="monospace" font-size="8" fill="#4a7aaa">RESIST. CONT.</text>
  <rect x="50" y="170" width="115" height="14" rx="2" fill="#0a1828"/>
  <rect x="50" y="170" width="90" height="14" rx="2" fill="#0d3a10"/>
  <text x="170" y="182" text-anchor="end" font-family="monospace" font-size="8" fill="#aaff00">87 μΩ</text>

  <text x="50" y="200" font-family="monospace" font-size="8" fill="#4a7aaa">TEMPO ABER.</text>
  <rect x="50" y="205" width="115" height="14" rx="2" fill="#0a1828"/>
  <rect x="50" y="205" width="85" height="14" rx="2" fill="#0d3a10"/>
  <text x="170" y="217" text-anchor="end" font-family="monospace" font-size="8" fill="#aaff00">42 ms</text>

  <text x="50" y="235" font-family="monospace" font-size="8" fill="#4a7aaa">NÍVEL SF6</text>
  <rect x="50" y="240" width="115" height="14" rx="2" fill="#0a1828"/>
  <rect x="50" y="240" width="70" height="14" rx="2" fill="#3a2008"/>
  <text x="170" y="252" text-anchor="end" font-family="monospace" font-size="8" fill="#ffaa00">BAIXO</text>

  <text x="50" y="270" font-family="monospace" font-size="8" fill="#4a7aaa">OPERAÇÕES</text>
  <text x="170" y="270" text-anchor="end" font-family="monospace" font-size="8" fill="#4a9aff">4.820</text>

  <line x1="50" y1="278" x2="176" y2="278" stroke="#1a2840" stroke-width="1"/>
  <!-- Status -->
  <rect x="50" y="285" width="115" height="22" rx="3" fill="#100800" stroke="#C4561E" stroke-width="1"/>
  <text x="107" y="300" text-anchor="middle" font-family="monospace" font-size="9" fill="#C4561E">EM MANUTENÇÃO</text>

  <!-- Repair tools graphic -->
  <rect x="50" y="315" width="50" height="22" rx="3" fill="#0a1020" stroke="#2a4a6a" stroke-width="1"/>
  <text x="75" y="330" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7aaa">LUBRIF.</text>
  <rect x="110" y="315" width="55" height="22" rx="3" fill="#0a1020" stroke="#2a4a6a" stroke-width="1"/>
  <text x="137" y="330" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7aaa">CALIBR.</text>
  <rect x="50" y="345" width="50" height="22" rx="3" fill="#0a1020" stroke="#2a4a6a" stroke-width="1"/>
  <text x="75" y="360" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7aaa">TESTE</text>
  <rect x="110" y="345" width="55" height="22" rx="3" fill="#0a1020" stroke="#aaff00" stroke-width="1"/>
  <text x="137" y="360" text-anchor="middle" font-family="monospace" font-size="7" fill="#aaff00">REVISÃO</text>

  <!-- Right panel - specs -->
  <rect x="615" y="80" width="145" height="320" rx="6" fill="#08111e" stroke="#1a2840" stroke-width="1.5"/>
  <text x="687" y="102" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a7aaa">ESPECIFICAÇÕES</text>
  <line x1="625" y1="110" x2="751" y2="110" stroke="#1a2840" stroke-width="1"/>
  <text x="625" y="130" font-family="monospace" font-size="8" fill="#4a7aaa">TIPO</text>
  <text x="751" y="130" text-anchor="end" font-family="monospace" font-size="8" fill="#aaa">VÁCUO / SF6</text>
  <text x="625" y="150" font-family="monospace" font-size="8" fill="#4a7aaa">V NOMINAL</text>
  <text x="751" y="150" text-anchor="end" font-family="monospace" font-size="9" fill="#C4561E">17,5 kV</text>
  <text x="625" y="170" font-family="monospace" font-size="8" fill="#4a7aaa">I NOMINAL</text>
  <text x="751" y="170" text-anchor="end" font-family="monospace" font-size="9" fill="#C4561E">630 A</text>
  <text x="625" y="190" font-family="monospace" font-size="8" fill="#4a7aaa">RUPTURA</text>
  <text x="751" y="190" text-anchor="end" font-family="monospace" font-size="9" fill="#4a9aff">25 kA</text>
  <text x="625" y="210" font-family="monospace" font-size="8" fill="#4a7aaa">NBI</text>
  <text x="751" y="210" text-anchor="end" font-family="monospace" font-size="9" fill="#4a9aff">95 kV</text>
  <text x="625" y="230" font-family="monospace" font-size="8" fill="#4a7aaa">NORMA</text>
  <text x="751" y="230" text-anchor="end" font-family="monospace" font-size="8" fill="#aaa">IEC 62271</text>
  <line x1="625" y1="240" x2="751" y2="240" stroke="#1a2840" stroke-width="1"/>
  <text x="625" y="256" font-family="monospace" font-size="8" fill="#4a7aaa">FABRICANTES</text>
  <text x="687" y="274" text-anchor="middle" font-family="monospace" font-size="8" fill="#aaa">WEG · ABB</text>
  <text x="687" y="290" text-anchor="middle" font-family="monospace" font-size="8" fill="#aaa">SCHNEIDER</text>
  <text x="687" y="306" text-anchor="middle" font-family="monospace" font-size="8" fill="#aaa">BEGHIM</text>

  <!-- Arc flash warning -->
  <g filter="url(#strong-glow)" opacity="0.3">
    <polygon points="320,150 360,80 400,150" fill="#ff8800"/>
  </g>

  <!-- Bottom label -->
  <rect x="0" y="430" width="800" height="50" fill="#060c18" opacity="0.9"/>
  <text x="400" y="461" text-anchor="middle" font-family="monospace" font-size="13" fill="#C4561E" letter-spacing="3">DISJUNTORES MÉDIA TENSÃO · REPARO</text>
</svg>