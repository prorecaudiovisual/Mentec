<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080e18"/>
      <stop offset="100%" style="stop-color:#111a28"/>
    </linearGradient>
    <linearGradient id="cabinet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1c2a3e"/>
      <stop offset="100%" style="stop-color:#14203a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Floor -->
  <rect x="0" y="380" width="800" height="100" fill="#0a1020"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="#1a2840" stroke-width="1"/>
  <!-- Floor reflection -->
  <rect x="0" y="380" width="800" height="10" fill="#0d1828" opacity="0.5"/>

  <!-- Cabinet body - large primary switchgear -->
  <rect x="120" y="100" width="180" height="280" rx="4" fill="url(#cabinet)" stroke="#2a3a5a" stroke-width="2.5"/>
  <!-- Cabinet left panel detail -->
  <rect x="130" y="115" width="160" height="240" rx="2" fill="#0f1a2e" stroke="#1e2d45" stroke-width="1"/>

  <!-- High voltage compartment -->
  <rect x="140" y="125" width="140" height="70" rx="2" fill="#0a1525" stroke="#2a4a6a" stroke-width="1"/>
  <text x="210" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">ALTA TENSÃO</text>
  <!-- Bushing insulators -->
  <g fill="#1a3050" stroke="#2a4a6a" stroke-width="1">
    <rect x="160" y="152" width="16" height="35" rx="3"/>
    <rect x="185" y="152" width="16" height="35" rx="3"/>
    <rect x="210" y="152" width="16" height="35" rx="3"/>
    <!-- Ribs -->
    <rect x="158" y="156" width="20" height="3" rx="1" fill="#0d2040"/>
    <rect x="158" y="163" width="20" height="3" rx="1" fill="#0d2040"/>
    <rect x="158" y="170" width="20" height="3" rx="1" fill="#0d2040"/>
    <rect x="183" y="156" width="20" height="3" rx="1" fill="#0d2040"/>
    <rect x="183" y="163" width="20" height="3" rx="1" fill="#0d2040"/>
    <rect x="183" y="170" width="20" height="3" rx="1" fill="#0d2040"/>
    <rect x="208" y="156" width="20" height="3" rx="1" fill="#0d2040"/>
    <rect x="208" y="163" width="20" height="3" rx="1" fill="#0d2040"/>
    <rect x="208" y="170" width="20" height="3" rx="1" fill="#0d2040"/>
  </g>

  <!-- Vacuum interrupter compartment -->
  <rect x="140" y="205" width="140" height="60" rx="2" fill="#0a1525" stroke="#2a4a6a" stroke-width="1"/>
  <text x="210" y="222" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">DISJUNTOR A VÁCUO</text>
  <!-- Vacuum bottle representation -->
  <ellipse cx="175" cy="240" rx="14" ry="18" fill="#0d2040" stroke="#2a4a6a" stroke-width="1.5"/>
  <ellipse cx="210" cy="240" rx="14" ry="18" fill="#0d2040" stroke="#2a4a6a" stroke-width="1.5"/>
  <ellipse cx="245" cy="240" rx="14" ry="18" fill="#0d2040" stroke="#2a4a6a" stroke-width="1.5"/>
  <ellipse cx="175" cy="240" rx="7" ry="10" fill="#061428" stroke="#1e3a5a" stroke-width="1"/>
  <ellipse cx="210" cy="240" rx="7" ry="10" fill="#061428" stroke="#1e3a5a" stroke-width="1"/>
  <ellipse cx="245" cy="240" rx="7" ry="10" fill="#061428" stroke="#1e3a5a" stroke-width="1"/>

  <!-- Control compartment -->
  <rect x="140" y="275" width="140" height="70" rx="2" fill="#0a1525" stroke="#2a4a6a" stroke-width="1"/>
  <text x="210" y="292" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">CONTROLE</text>
  <!-- Relay/meter faces -->
  <rect x="150" y="298" width="35" height="28" rx="1" fill="#061020" stroke="#1a3a5a" stroke-width="1"/>
  <circle cx="167" cy="312" r="10" fill="#0a1a30" stroke="#2a4a6a" stroke-width="1"/>
  <line x1="167" y1="312" x2="167" y2="305" stroke="#C4561E" stroke-width="1.5"/>
  <line x1="167" y1="312" x2="173" y2="315" stroke="#4a9aff" stroke-width="1.5"/>
  <rect x="195" y="298" width="35" height="28" rx="1" fill="#061020" stroke="#1a3a5a" stroke-width="1"/>
  <circle cx="212" cy="312" r="10" fill="#0a1a30" stroke="#2a4a6a" stroke-width="1"/>
  <line x1="212" y1="312" x2="218" y2="306" stroke="#aaff00" stroke-width="1.5"/>
  <!-- LED indicators -->
  <circle cx="250" cy="302" r="4" fill="#00ff44" filter="url(#glow)"/>
  <circle cx="262" cy="302" r="4" fill="#ff4400" filter="url(#glow)"/>
  <circle cx="250" cy="316" r="4" fill="#ffaa00" filter="url(#glow)"/>
  <circle cx="262" cy="316" r="4" fill="#00aaff" filter="url(#glow)"/>

  <!-- Second cabinet -->
  <rect x="320" y="100" width="160" height="280" rx="4" fill="url(#cabinet)" stroke="#2a3a5a" stroke-width="2.5"/>
  <rect x="330" y="115" width="140" height="240" rx="2" fill="#0f1a2e" stroke="#1e2d45" stroke-width="1"/>
  <!-- Metering section -->
  <rect x="340" y="125" width="120" height="80" rx="2" fill="#0a1525" stroke="#2a4a6a" stroke-width="1"/>
  <text x="400" y="142" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">MEDIÇÃO</text>
  <rect x="350" y="150" width="45" height="35" rx="1" fill="#061020" stroke="#1a3a5a"/>
  <text x="372" y="163" text-anchor="middle" font-family="monospace" font-size="8" fill="#00ccff">138.4</text>
  <text x="372" y="175" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7aaa">kV</text>
  <rect x="405" y="150" width="45" height="35" rx="1" fill="#061020" stroke="#1a3a5a"/>
  <text x="427" y="163" text-anchor="middle" font-family="monospace" font-size="8" fill="#aaff00">412.6</text>
  <text x="427" y="175" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a7aaa">A</text>

  <!-- Protection relay compartment -->
  <rect x="340" y="215" width="120" height="70" rx="2" fill="#0a1525" stroke="#2a4a6a" stroke-width="1"/>
  <text x="400" y="232" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">RELÉ DE PROTEÇÃO</text>
  <rect x="350" y="240" width="100" height="38" rx="2" fill="#061020" stroke="#1a3a5a"/>
  <text x="400" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#00ccff">REMP-100</text>
  <text x="400" y="270" text-anchor="middle" font-family="monospace" font-size="8" fill="#aaff00">NORMAL ●</text>

  <!-- Busbar connections top -->
  <rect x="340" y="295" width="120" height="45" rx="2" fill="#0a1525" stroke="#2a4a6a" stroke-width="1"/>
  <text x="400" y="318" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">BARRAMENTO</text>
  <line x1="355" y1="310" x2="445" y2="310" stroke="#C4561E" stroke-width="3"/>
  <line x1="355" y1="316" x2="445" y2="316" stroke="#4a9aff" stroke-width="2"/>
  <line x1="355" y1="322" x2="445" y2="322" stroke="#aaff00" stroke-width="2"/>

  <!-- Third cabinet partial -->
  <rect x="500" y="140" width="120" height="240" rx="4" fill="url(#cabinet)" stroke="#2a3a5a" stroke-width="2" opacity="0.7"/>

  <!-- Busbars connecting cabinets -->
  <rect x="300" y="105" width="20" height="8" rx="1" fill="#C4561E"/>
  <rect x="480" y="105" width="20" height="8" rx="1" fill="#C4561E"/>
  <rect x="300" y="115" width="20" height="8" rx="1" fill="#4a9aff"/>
  <rect x="480" y="115" width="20" height="8" rx="1" fill="#4a9aff"/>
  <rect x="300" y="125" width="20" height="8" rx="1" fill="#aaff00"/>
  <rect x="480" y="125" width="20" height="8" rx="1" fill="#aaff00"/>

  <!-- Maintenance technician - wrench indicator -->
  <g transform="translate(640, 200)" opacity="0.8">
    <circle cx="40" cy="40" r="35" fill="#0a1525" stroke="#C4561E" stroke-width="2"/>
    <!-- Wrench icon -->
    <path d="M25,55 L45,35 Q55,25 60,30 Q65,35 55,45 L35,65 Z" fill="none" stroke="#C4561E" stroke-width="3" stroke-linecap="round"/>
    <circle cx="55" cy="30" r="8" fill="none" stroke="#C4561E" stroke-width="2"/>
  </g>

  <rect x="595" y="260" width="155" height="60" rx="4" fill="#0a1020" stroke="#1a2a3a" stroke-width="1"/>
  <text x="672" y="282" text-anchor="middle" font-family="monospace" font-size="9" fill="#C4561E">MANUTENÇÃO</text>
  <text x="672" y="298" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">CABINE PRIMÁRIA</text>
  <text x="672" y="312" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">13,8 kV</text>

  <!-- Bottom label -->
  <rect x="0" y="430" width="800" height="50" fill="#080e18" opacity="0.9"/>
  <text x="400" y="461" text-anchor="middle" font-family="monospace" font-size="13" fill="#C4561E" letter-spacing="3">CABINES PRIMÁRIAS · MÉDIA TENSÃO</text>
</svg>