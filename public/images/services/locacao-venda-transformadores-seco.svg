<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080e1a"/>
      <stop offset="100%" style="stop-color:#111828"/>
    </linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a1a0a"/>
      <stop offset="50%" style="stop-color:#3a2510"/>
      <stop offset="100%" style="stop-color:#2a1a0a"/>
    </linearGradient>
    <linearGradient id="coil-a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C4561E"/>
      <stop offset="100%" style="stop-color:#7a3010"/>
    </linearGradient>
    <linearGradient id="coil-b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9aff"/>
      <stop offset="100%" style="stop-color:#1a4a8a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Background subtle grid -->
  <g stroke="#0d1828" stroke-width="1" opacity="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="480"/><line x1="160" y1="0" x2="160" y2="480"/>
    <line x1="240" y1="0" x2="240" y2="480"/><line x1="320" y1="0" x2="320" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="480"/><line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="560" y1="0" x2="560" y2="480"/><line x1="640" y1="0" x2="640" y2="480"/>
    <line x1="720" y1="0" x2="720" y2="480"/>
  </g>

  <!-- Floor / base plate -->
  <rect x="100" y="360" width="420" height="25" rx="3" fill="#1a2035" stroke="#2a3a55" stroke-width="2"/>
  <!-- Rail mounting -->
  <rect x="150" y="355" width="320" height="12" rx="2" fill="#141e32" stroke="#1a2a45" stroke-width="1"/>

  <!-- Dry transformer body - 3 phase -->
  <!-- Iron core (E-I lamination) - center visible -->
  <rect x="215" y="130" width="50" height="230" rx="2" fill="url(#core)" stroke="#5a3a18" stroke-width="1.5"/>
  <rect x="270" y="130" width="80" height="230" rx="2" fill="url(#core)" stroke="#5a3a18" stroke-width="1.5"/>
  <rect x="355" y="130" width="50" height="230" rx="2" fill="url(#core)" stroke="#5a3a18" stroke-width="1.5"/>

  <!-- Core lamination lines -->
  <g stroke="#4a2a0a" stroke-width="0.8" opacity="0.6">
    <line x1="217" y1="140" x2="263" y2="140"/><line x1="217" y1="150" x2="263" y2="150"/>
    <line x1="217" y1="160" x2="263" y2="160"/><line x1="217" y1="170" x2="263" y2="170"/>
    <line x1="217" y1="180" x2="263" y2="180"/><line x1="217" y1="190" x2="263" y2="190"/>
    <line x1="217" y1="200" x2="263" y2="200"/><line x1="217" y1="210" x2="263" y2="210"/>
    <line x1="217" y1="220" x2="263" y2="220"/><line x1="217" y1="230" x2="263" y2="230"/>
    <line x1="272" y1="140" x2="348" y2="140"/><line x1="272" y1="155" x2="348" y2="155"/>
    <line x1="272" y1="170" x2="348" y2="170"/><line x1="272" y1="185" x2="348" y2="185"/>
    <line x1="272" y1="200" x2="348" y2="200"/><line x1="272" y1="215" x2="348" y2="215"/>
  </g>

  <!-- Top yoke -->
  <rect x="215" y="115" width="190" height="22" rx="2" fill="#3a2510" stroke="#5a3a18" stroke-width="1.5"/>
  <!-- Bottom yoke -->
  <rect x="215" y="345" width="190" height="22" rx="2" fill="#3a2510" stroke="#5a3a18" stroke-width="1.5"/>

  <!-- HV Coils (orange/resin encapsulated) - Phase A -->
  <rect x="195" y="140" width="85" height="210" rx="8" fill="url(#coil-a)" stroke="#a04010" stroke-width="2" opacity="0.85"/>
  <!-- Winding texture -->
  <g stroke="#8a3a0a" stroke-width="1" opacity="0.4">
    <line x1="200" y1="155" x2="275" y2="155"/><line x1="200" y1="165" x2="275" y2="165"/>
    <line x1="200" y1="175" x2="275" y2="175"/><line x1="200" y1="185" x2="275" y2="185"/>
    <line x1="200" y1="195" x2="275" y2="195"/><line x1="200" y1="205" x2="275" y2="205"/>
    <line x1="200" y1="215" x2="275" y2="215"/><line x1="200" y1="225" x2="275" y2="225"/>
    <line x1="200" y1="235" x2="275" y2="235"/><line x1="200" y1="245" x2="275" y2="245"/>
    <line x1="200" y1="255" x2="275" y2="255"/><line x1="200" y1="265" x2="275" y2="265"/>
    <line x1="200" y1="275" x2="275" y2="275"/><line x1="200" y1="285" x2="275" y2="285"/>
    <line x1="200" y1="295" x2="275" y2="295"/><line x1="200" y1="305" x2="275" y2="305"/>
    <line x1="200" y1="315" x2="275" y2="315"/>
  </g>

  <!-- LV Coils (blue) - inner, Phase A -->
  <rect x="210" y="155" width="55" height="180" rx="4" fill="url(#coil-b)" stroke="#1a4a8a" stroke-width="1.5" opacity="0.8"/>

  <!-- Phase B coil (center) -->
  <rect x="265" y="140" width="90" height="210" rx="8" fill="url(#coil-a)" stroke="#a04010" stroke-width="2" opacity="0.85"/>
  <rect x="278" y="155" width="65" height="180" rx="4" fill="url(#coil-b)" stroke="#1a4a8a" stroke-width="1.5" opacity="0.8"/>

  <!-- Phase C coil -->
  <rect x="340" y="140" width="85" height="210" rx="8" fill="url(#coil-a)" stroke="#a04010" stroke-width="2" opacity="0.85"/>
  <rect x="355" y="155" width="55" height="180" rx="4" fill="url(#coil-b)" stroke="#1a4a8a" stroke-width="1.5" opacity="0.8"/>

  <!-- HV Bushings top -->
  <g fill="#1a3050" stroke="#2a4a7a" stroke-width="1.5">
    <rect x="225" y="88" width="18" height="35" rx="3"/>
    <rect x="300" y="88" width="18" height="35" rx="3"/>
    <rect x="375" y="88" width="18" height="35" rx="3"/>
    <!-- Ribs -->
    <rect x="223" y="92" width="22" height="4" rx="1" fill="#0d2040"/>
    <rect x="223" y="100" width="22" height="4" rx="1" fill="#0d2040"/>
    <rect x="223" y="108" width="22" height="4" rx="1" fill="#0d2040"/>
    <rect x="298" y="92" width="22" height="4" rx="1" fill="#0d2040"/>
    <rect x="298" y="100" width="22" height="4" rx="1" fill="#0d2040"/>
    <rect x="298" y="108" width="22" height="4" rx="1" fill="#0d2040"/>
    <rect x="373" y="92" width="22" height="4" rx="1" fill="#0d2040"/>
    <rect x="373" y="100" width="22" height="4" rx="1" fill="#0d2040"/>
    <rect x="373" y="108" width="22" height="4" rx="1" fill="#0d2040"/>
  </g>

  <!-- HV terminal connections -->
  <circle cx="234" cy="85" r="5" fill="#C4561E" filter="url(#glow)"/>
  <circle cx="309" cy="85" r="5" fill="#C4561E" filter="url(#glow)"/>
  <circle cx="384" cy="85" r="5" fill="#C4561E" filter="url(#glow)"/>

  <!-- LV Terminals bottom -->
  <rect x="210" y="362" width="12" height="20" rx="2" fill="#4a9aff"/>
  <rect x="230" y="362" width="12" height="20" rx="2" fill="#4a9aff"/>
  <rect x="282" y="362" width="12" height="20" rx="2" fill="#4a9aff"/>
  <rect x="302" y="362" width="12" height="20" rx="2" fill="#4a9aff"/>
  <rect x="355" y="362" width="12" height="20" rx="2" fill="#4a9aff"/>
  <rect x="375" y="362" width="12" height="20" rx="2" fill="#4a9aff"/>

  <!-- Phase labels -->
  <text x="237" y="80" text-anchor="middle" font-family="monospace" font-size="10" fill="#C4561E" filter="url(#glow)">A</text>
  <text x="312" y="80" text-anchor="middle" font-family="monospace" font-size="10" fill="#C4561E" filter="url(#glow)">B</text>
  <text x="387" y="80" text-anchor="middle" font-family="monospace" font-size="10" fill="#C4561E" filter="url(#glow)">C</text>

  <!-- Information panel right -->
  <rect x="570" y="80" width="190" height="300" rx="6" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
  <text x="665" y="102" text-anchor="middle" font-family="monospace" font-size="10" fill="#C4561E" letter-spacing="1">TRAFO A SECO</text>
  <line x1="578" y1="110" x2="752" y2="110" stroke="#1a2840" stroke-width="1"/>
  <text x="578" y="130" font-family="monospace" font-size="9" fill="#4a7aaa">TIPO</text>
  <text x="752" y="130" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">ENCAPSULADO</text>
  <text x="578" y="150" font-family="monospace" font-size="9" fill="#4a7aaa">ISOLAÇÃO</text>
  <text x="752" y="150" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">RESINA EPÓXI</text>
  <text x="578" y="170" font-family="monospace" font-size="9" fill="#4a7aaa">POTÊNCIA</text>
  <text x="752" y="170" text-anchor="end" font-family="monospace" font-size="11" fill="#C4561E">45–3500 kVA</text>
  <text x="578" y="190" font-family="monospace" font-size="9" fill="#4a7aaa">TENSÃO HV</text>
  <text x="752" y="190" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">13,8 kV</text>
  <text x="578" y="210" font-family="monospace" font-size="9" fill="#4a7aaa">TENSÃO LV</text>
  <text x="752" y="210" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">380/220 V</text>
  <text x="578" y="230" font-family="monospace" font-size="9" fill="#4a7aaa">NORMA</text>
  <text x="752" y="230" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">NBR 5356</text>
  <text x="578" y="250" font-family="monospace" font-size="9" fill="#4a7aaa">IP</text>
  <text x="752" y="250" text-anchor="end" font-family="monospace" font-size="9" fill="#aaa">00 / 21 / 54</text>
  <line x1="578" y1="262" x2="752" y2="262" stroke="#1a2840" stroke-width="1"/>
  <!-- Feature badges -->
  <rect x="578" y="272" width="78" height="22" rx="3" fill="#0d2010" stroke="#2a4a20" stroke-width="1"/>
  <text x="617" y="287" text-anchor="middle" font-family="monospace" font-size="8" fill="#aaff00">ECO-FRIENDLY</text>
  <rect x="662" y="272" width="82" height="22" rx="3" fill="#0d1020" stroke="#C4561E" stroke-width="1"/>
  <text x="703" y="287" text-anchor="middle" font-family="monospace" font-size="8" fill="#C4561E">BAIXA MANUT.</text>
  <rect x="578" y="300" width="78" height="22" rx="3" fill="#0d1a2a" stroke="#1a3a5a" stroke-width="1"/>
  <text x="617" y="315" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a9aff">INDOOR</text>
  <rect x="662" y="300" width="82" height="22" rx="3" fill="#1a1008" stroke="#5a3a10" stroke-width="1"/>
  <text x="703" y="315" text-anchor="middle" font-family="monospace" font-size="8" fill="#C4561E">SEM ÓLEO</text>

  <!-- Bottom label -->
  <rect x="0" y="430" width="800" height="50" fill="#080e1a" opacity="0.9"/>
  <text x="400" y="461" text-anchor="middle" font-family="monospace" font-size="13" fill="#C4561E" letter-spacing="3">TRANSFORMADOR A SECO · RESINA EPÓXI</text>
</svg>