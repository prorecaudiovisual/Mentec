<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2235"/>
      <stop offset="100%" style="stop-color:#0f1825"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#1a2a3a" stroke-width="1" opacity="0.6">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="80" y1="0" x2="80" y2="480"/>
    <line x1="160" y1="0" x2="160" y2="480"/>
    <line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="480"/>
    <line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="560" y1="0" x2="560" y2="480"/>
    <line x1="640" y1="0" x2="640" y2="480"/>
    <line x1="720" y1="0" x2="720" y2="480"/>
  </g>

  <!-- Electrical panel body -->
  <rect x="260" y="80" width="280" height="320" rx="4" fill="url(#panel)" stroke="#2a3a55" stroke-width="2"/>
  <rect x="270" y="90" width="260" height="300" rx="2" fill="#0d1520" stroke="#1e2d45" stroke-width="1"/>

  <!-- Panel header -->
  <rect x="270" y="90" width="260" height="36" rx="2" fill="#1a2840"/>
  <text x="400" y="113" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a7aaa" letter-spacing="2">PAINEL ELÉTRICO</text>

  <!-- Circuit breakers grid -->
  <g fill="#0a1525" stroke="#2a3a55" stroke-width="1">
    <!-- Row 1 -->
    <rect x="285" y="138" width="32" height="44" rx="2"/>
    <rect x="325" y="138" width="32" height="44" rx="2"/>
    <rect x="365" y="138" width="32" height="44" rx="2"/>
    <rect x="405" y="138" width="32" height="44" rx="2"/>
    <rect x="445" y="138" width="32" height="44" rx="2"/>
    <rect x="485" y="138" width="32" height="44" rx="2"/>
    <!-- Row 2 -->
    <rect x="285" y="192" width="32" height="44" rx="2"/>
    <rect x="325" y="192" width="32" height="44" rx="2"/>
    <rect x="365" y="192" width="32" height="44" rx="2"/>
    <rect x="405" y="192" width="32" height="44" rx="2"/>
    <rect x="445" y="192" width="32" height="44" rx="2"/>
    <rect x="485" y="192" width="32" height="44" rx="2"/>
    <!-- Row 3 -->
    <rect x="285" y="246" width="32" height="44" rx="2"/>
    <rect x="325" y="246" width="32" height="44" rx="2"/>
    <rect x="365" y="246" width="32" height="44" rx="2"/>
    <rect x="405" y="246" width="32" height="44" rx="2"/>
    <rect x="445" y="246" width="32" height="44" rx="2"/>
    <rect x="485" y="246" width="32" height="44" rx="2"/>
  </g>

  <!-- Breaker switches - ON (orange) -->
  <rect x="289" y="150" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="329" y="150" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="409" y="150" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="449" y="150" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="489" y="150" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="289" y="204" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="369" y="204" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="409" y="204" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="449" y="204" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="289" y="258" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="329" y="258" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="409" y="258" width="24" height="12" rx="2" fill="#C4561E"/>
  <rect x="489" y="258" width="24" height="12" rx="2" fill="#C4561E"/>

  <!-- OFF switches (grey) -->
  <rect x="369" y="162" width="24" height="12" rx="2" fill="#2a3a55"/>
  <rect x="329" y="204" width="24" height="12" rx="2" fill="#2a3a55"/>
  <rect x="489" y="204" width="24" height="12" rx="2" fill="#2a3a55"/>
  <rect x="365" y="258" width="24" height="12" rx="2" fill="#2a3a55"/>
  <rect x="445" y="258" width="24" height="12" rx="2" fill="#2a3a55"/>

  <!-- Warning triangle - highlighted -->
  <g filter="url(#glow)">
    <polygon points="370,310 400,265 430,310" fill="none" stroke="#f5a623" stroke-width="2.5"/>
    <text x="400" y="305" text-anchor="middle" font-size="18" fill="#f5a623" font-family="monospace">!</text>
  </g>

  <!-- Safety helmet left side -->
  <g transform="translate(80, 160)">
    <!-- Helmet dome -->
    <path d="M0,60 Q0,-20 80,-20 Q160,-20 160,60" fill="#C4561E" stroke="#a03a10" stroke-width="2"/>
    <!-- Brim -->
    <rect x="-10" y="58" width="180" height="14" rx="3" fill="#a03a10"/>
    <!-- Stripe -->
    <path d="M10,58 Q80,30 150,58" fill="none" stroke="#ff8844" stroke-width="3" opacity="0.6"/>
    <!-- Ventilation lines -->
    <path d="M40,10 Q80,-5 120,10" fill="none" stroke="#a03a10" stroke-width="1.5"/>
    <path d="M30,25 Q80,8 130,25" fill="none" stroke="#a03a10" stroke-width="1.5"/>
  </g>

  <!-- NR10 badge -->
  <rect x="88" y="290" width="144" height="54" rx="4" fill="#0a1525" stroke="#C4561E" stroke-width="2"/>
  <text x="160" y="315" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#C4561E">NR-10</text>
  <text x="160" y="334" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a7aaa" letter-spacing="1">CONFORMIDADE</text>

  <!-- Wiring lines right side -->
  <g stroke="#1e4a7a" stroke-width="2" fill="none" opacity="0.7">
    <path d="M560,120 L620,120 L620,160"/>
    <path d="M560,140 L640,140 L640,200"/>
    <path d="M560,160 L660,160 L660,240"/>
    <path d="M560,180 L680,180 L680,280"/>
    <!-- Nodes -->
    <circle cx="620" cy="160" r="4" fill="#2a6aaa" stroke="none"/>
    <circle cx="640" cy="200" r="4" fill="#2a6aaa" stroke="none"/>
    <circle cx="660" cy="240" r="4" fill="#2a6aaa" stroke="none"/>
    <circle cx="680" cy="280" r="4" fill="#2a6aaa" stroke="none"/>
  </g>

  <!-- Bottom label -->
  <rect x="0" y="430" width="800" height="50" fill="#0a0f1a" opacity="0.8"/>
  <text x="400" y="461" text-anchor="middle" font-family="monospace" font-size="13" fill="#C4561E" letter-spacing="3">LAUDO NR-10 · SEGURANÇA ELÉTRICA</text>
</svg>