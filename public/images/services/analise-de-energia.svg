<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c18"/>
      <stop offset="100%" style="stop-color:#0e1a2e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#061220"/>
      <stop offset="100%" style="stop-color:#030a14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Oscilloscope/analyzer body -->
  <rect x="60" y="60" width="480" height="340" rx="8" fill="#0d1828" stroke="#1e2d45" stroke-width="2"/>
  <rect x="75" y="75" width="360" height="270" rx="4" fill="url(#screen)" stroke="#0a2040" stroke-width="1"/>

  <!-- Screen grid -->
  <g stroke="#0a2a3a" stroke-width="1" opacity="0.7">
    <line x1="75" y1="135" x2="435" y2="135"/>
    <line x1="75" y1="195" x2="435" y2="195"/>
    <line x1="75" y1="255" x2="435" y2="255"/>
    <line x1="75" y1="315" x2="435" y2="315"/>
    <line x1="147" y1="75" x2="147" y2="345"/>
    <line x1="219" y1="75" x2="219" y2="345"/>
    <line x1="291" y1="75" x2="291" y2="345"/>
    <line x1="363" y1="75" x2="363" y2="345"/>
  </g>
  <!-- Center lines -->
  <line x1="75" y1="210" x2="435" y2="210" stroke="#0d3a5a" stroke-width="1.5"/>
  <line x1="255" y1="75" x2="255" y2="345" stroke="#0d3a5a" stroke-width="1.5"/>

  <!-- Phase A - sine wave (orange/red) -->
  <g filter="url(#glow)">
    <path d="M75,210 C93,210 102,110 120,110 C138,110 147,310 165,310 C183,310 192,110 210,110 C228,110 237,310 255,310 C273,310 282,110 300,110 C318,110 327,310 345,310 C363,310 372,110 390,110 C408,110 417,210 435,210"
      fill="none" stroke="#ff4422" stroke-width="2.5"/>
  </g>

  <!-- Phase B - offset (cyan) -->
  <g filter="url(#glow)" opacity="0.9">
    <path d="M75,260 C87,260 102,130 126,130 C150,130 165,290 189,290 C213,290 228,130 252,130 C276,130 291,290 315,290 C339,290 354,130 378,130 C402,130 417,260 435,260"
      fill="none" stroke="#00ccff" stroke-width="2.5"/>
  </g>

  <!-- Phase C - offset (yellow-green) -->
  <g filter="url(#glow)" opacity="0.9">
    <path d="M75,160 C87,160 102,290 126,290 C150,290 165,130 189,130 C213,130 228,290 252,290 C276,290 291,130 315,130 C339,130 354,290 378,290 C402,290 417,160 435,160"
      fill="none" stroke="#aaff00" stroke-width="2.5"/>
  </g>

  <!-- Distortion spike (anomaly) -->
  <g filter="url(#glow)">
    <polyline points="270,210 274,160 278,80 282,160 286,210" fill="none" stroke="#ffff00" stroke-width="2"/>
  </g>

  <!-- Legend -->
  <line x1="80" y1="358" x2="105" y2="358" stroke="#ff4422" stroke-width="2"/>
  <text x="110" y="362" font-family="monospace" font-size="10" fill="#ff4422">FASE A</text>
  <line x1="165" y1="358" x2="190" y2="358" stroke="#00ccff" stroke-width="2"/>
  <text x="195" y="362" font-family="monospace" font-size="10" fill="#00ccff">FASE B</text>
  <line x1="250" y1="358" x2="275" y2="358" stroke="#aaff00" stroke-width="2"/>
  <text x="280" y="362" font-family="monospace" font-size="10" fill="#aaff00">FASE C</text>
  <line x1="335" y1="358" x2="360" y2="358" stroke="#ffff00" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="365" y="362" font-family="monospace" font-size="10" fill="#ffff00">ANOMALIA</text>

  <!-- Controls on right of oscilloscope -->
  <g transform="translate(450,80)">
    <circle cx="30" cy="30" r="18" fill="#0a1525" stroke="#2a3a55" stroke-width="2"/>
    <circle cx="30" cy="30" r="10" fill="#141e2e"/>
    <line x1="30" y1="16" x2="30" y2="22" stroke="#4a7aaa" stroke-width="2"/>
    <text x="30" y="65" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">V/DIV</text>

    <circle cx="30" cy="110" r="18" fill="#0a1525" stroke="#2a3a55" stroke-width="2"/>
    <circle cx="30" cy="110" r="10" fill="#141e2e"/>
    <line x1="30" y1="96" x2="38" y2="105" stroke="#4a7aaa" stroke-width="2"/>
    <text x="30" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">T/DIV</text>

    <!-- Buttons -->
    <rect x="10" y="180" width="40" height="16" rx="3" fill="#C4561E"/>
    <text x="30" y="192" text-anchor="middle" font-family="monospace" font-size="8" fill="white">RUN</text>
    <rect x="10" y="205" width="40" height="16" rx="3" fill="#1a2840" stroke="#2a3a55" stroke-width="1"/>
    <text x="30" y="217" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">HOLD</text>
    <rect x="10" y="230" width="40" height="16" rx="3" fill="#1a2840" stroke="#2a3a55" stroke-width="1"/>
    <text x="30" y="242" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7aaa">SAVE</text>
  </g>

  <!-- Metrics panel right side -->
  <rect x="570" y="60" width="170" height="340" rx="6" fill="#0a1020" stroke="#1a2a3a" stroke-width="1.5"/>
  <text x="655" y="85" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a7aaa" letter-spacing="1">MEDIÇÕES</text>
  <line x1="580" y1="92" x2="730" y2="92" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Metric rows -->
  <text x="582" y="115" font-family="monospace" font-size="9" fill="#4a7aaa">THD</text>
  <text x="728" y="115" text-anchor="end" font-family="monospace" font-size="11" fill="#ff4422">4.8%</text>

  <text x="582" y="140" font-family="monospace" font-size="9" fill="#4a7aaa">FREQ</text>
  <text x="728" y="140" text-anchor="end" font-family="monospace" font-size="11" fill="#aaff00">60.01 Hz</text>

  <text x="582" y="165" font-family="monospace" font-size="9" fill="#4a7aaa">V RMS</text>
  <text x="728" y="165" text-anchor="end" font-family="monospace" font-size="11" fill="#00ccff">219.4 V</text>

  <text x="582" y="190" font-family="monospace" font-size="9" fill="#4a7aaa">I RMS</text>
  <text x="728" y="190" text-anchor="end" font-family="monospace" font-size="11" fill="#00ccff">48.2 A</text>

  <text x="582" y="215" font-family="monospace" font-size="9" fill="#4a7aaa">FP</text>
  <text x="728" y="215" text-anchor="end" font-family="monospace" font-size="11" fill="#aaff00">0.92</text>

  <text x="582" y="240" font-family="monospace" font-size="9" fill="#4a7aaa">kW</text>
  <text x="728" y="240" text-anchor="end" font-family="monospace" font-size="11" fill="#ff4422">10.58</text>

  <text x="582" y="265" font-family="monospace" font-size="9" fill="#4a7aaa">kVAr</text>
  <text x="728" y="265" text-anchor="end" font-family="monospace" font-size="11" fill="#ffff00">2.34</text>

  <line x1="580" y1="278" x2="730" y2="278" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Bar chart at bottom of metrics -->
  <text x="582" y="296" font-family="monospace" font-size="9" fill="#4a7aaa">HARMÔNICOS</text>
  <rect x="582" y="310" width="8" height="36" fill="#ff4422"/>
  <rect x="594" y="325" width="8" height="21" fill="#ff8844"/>
  <rect x="606" y="330" width="8" height="16" fill="#ffaa22"/>
  <rect x="618" y="334" width="8" height="12" fill="#ffcc44"/>
  <rect x="630" y="337" width="8" height="9" fill="#ffee66"/>
  <rect x="642" y="339" width="8" height="7" fill="#aaff44"/>
  <rect x="654" y="340" width="8" height="6" fill="#44ffaa"/>
  <rect x="666" y="341" width="8" height="5" fill="#22ccff"/>
  <rect x="678" y="342" width="8" height="4" fill="#4488ff"/>
  <line x1="582" y1="346" x2="730" y2="346" stroke="#1a2a3a" stroke-width="1"/>
  <text x="582" y="358" font-family="monospace" font-size="8" fill="#2a4a6a">1ª  3ª  5ª  7ª  9ª  11ª 13ª 15ª 17ª</text>

  <!-- Bottom label -->
  <rect x="0" y="430" width="800" height="50" fill="#060c18" opacity="0.9"/>
  <text x="400" y="461" text-anchor="middle" font-family="monospace" font-size="13" fill="#00ccff" letter-spacing="3">ANÁLISE DE ENERGIA · QUALIDADE ELÉTRICA</text>
</svg>