<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="100%" style="stop-color:#101420"/>
    </linearGradient>
    <linearGradient id="tank" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2030"/>
      <stop offset="100%" style="stop-color:#2a3040"/>
    </linearGradient>
    <linearGradient id="hv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Transmission towers suggestion (background) -->
  <line x1="80" y1="80" x2="80" y2="300" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <line x1="60" y1="130" x2="100" y2="130" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <line x1="65" y1="155" x2="95" y2="155" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <line x1="60" y1="130" x2="80" y2="80" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="100" y1="130" x2="80" y2="80" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <line x1="720" y1="80" x2="720" y2="300" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <line x1="700" y1="130" x2="740" y2="130" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <line x1="705" y1="155" x2="735" y2="155" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <line x1="700" y1="130" x2="720" y2="80" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="740" y1="130" x2="720" y2="80" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- High voltage lines -->
  <path d="M60,130 Q400,100 740,130" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M65,155 Q400,125 735,155" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Main transformer tank -->
  <rect x="250" y="180" width="300" height="180" rx="4" fill="url(#tank)" stroke="#4a5568" stroke-width="2"/>

  <!-- Radiators left -->
  <rect x="210" y="200" width="15" height="140" rx="2" fill="#1a2030" stroke="#4a5568" stroke-width="1"/>
  <rect x="228" y="200" width="15" height="140" rx="2" fill="#1a2030" stroke="#4a5568" stroke-width="1"/>
  <rect x="246" y="200" width="8" height="140" rx="2" fill="#1a2030" stroke="#4a5568" stroke-width="1"/>

  <!-- Radiators right -->
  <rect x="550" y="200" width="8" height="140" rx="2" fill="#1a2030" stroke="#4a5568" stroke-width="1"/>
  <rect x="560" y="200" width="15" height="140" rx="2" fill="#1a2030" stroke="#4a5568" stroke-width="1"/>
  <rect x="578" y="200" width="15" height="140" rx="2" fill="#1a2030" stroke="#4a5568" stroke-width="1"/>

  <!-- HV Bushings top -->
  <rect x="305" y="145" width="18" height="45" rx="4" fill="url(#hv)"/>
  <ellipse cx="314" cy="145" rx="14" ry="6" fill="#f59e0b"/>
  <line x1="314" y1="115" x2="314" y2="145" stroke="#f59e0b" stroke-width="2"/>
  <rect x="345" y="145" width="18" height="45" rx="4" fill="url(#hv)"/>
  <ellipse cx="354" cy="145" rx="14" ry="6" fill="#f59e0b"/>
  <line x1="354" y1="115" x2="354" y2="145" stroke="#f59e0b" stroke-width="2"/>
  <rect x="385" y="145" width="18" height="45" rx="4" fill="url(#hv)"/>
  <ellipse cx="394" cy="145" rx="14" ry="6" fill="#f59e0b"/>
  <line x1="394" y1="115" x2="394" y2="145" stroke="#f59e0b" stroke-width="2"/>

  <!-- LV Bushings top -->
  <rect x="440" y="155" width="14" height="35" rx="3" fill="#4a9edd"/>
  <ellipse cx="447" cy="155" rx="10" ry="5" fill="#6abcf5"/>
  <line x1="447" y1="130" x2="447" y2="155" stroke="#4a9edd" stroke-width="2"/>
  <rect x="465" y="155" width="14" height="35" rx="3" fill="#4a9edd"/>
  <ellipse cx="472" cy="155" rx="10" ry="5" fill="#6abcf5"/>
  <line x1="472" y1="130" x2="472" y2="155" stroke="#4a9edd" stroke-width="2"/>
  <rect x="490" y="155" width="14" height="35" rx="3" fill="#4a9edd"/>
  <ellipse cx="497" cy="155" rx="10" ry="5" fill="#6abcf5"/>
  <line x1="497" y1="130" x2="497" y2="155" stroke="#4a9edd" stroke-width="2"/>

  <!-- Labels -->
  <text x="354" y="108" font-family="Arial,sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" letter-spacing="2" opacity="0.8">AT (138 kV)</text>
  <text x="472" y="120" font-family="Arial,sans-serif" font-size="9" fill="#4a9edd" text-anchor="middle" letter-spacing="2" opacity="0.8">BT (13,8 kV)</text>

  <!-- Conservator tank -->
  <ellipse cx="400" cy="175" rx="35" ry="12" fill="#2a3040" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="400" y1="180" x2="400" y2="195" stroke="#4a5568" stroke-width="2"/>

  <!-- MVA rating -->
  <text x="400" y="265" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.15">MVA</text>

  <!-- Bund wall -->
  <line x1="160" y1="390" x2="640" y2="390" stroke="#4a5568" stroke-width="2"/>
  <line x1="160" y1="360" x2="160" y2="390" stroke="#4a5568" stroke-width="2"/>
  <line x1="640" y1="360" x2="640" y2="390" stroke="#4a5568" stroke-width="2"/>
  <text x="400" y="410" font-family="Arial,sans-serif" font-size="9" fill="#ffffff" opacity="0.19" text-anchor="middle" letter-spacing="2">BACIA DE CONTENÇÃO</text>

  <!-- Title -->
  <text x="400" y="48" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.6">TRANSFORMADORES DE FORÇA</text>

  <rect x="0" y="435" width="800" height="15" fill="#f59e0b" opacity="0.7"/>
</svg>
