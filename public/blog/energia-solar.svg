<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1520"/>
      <stop offset="100%" style="stop-color:#1a1500"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Sun glow -->
  <circle cx="150" cy="180" r="100" fill="url(#glow)"/>
  <!-- Sun -->
  <circle cx="150" cy="180" r="45" fill="url(#sun)" opacity="0.9"/>
  <!-- Sun rays -->
  <line x1="150" y1="115" x2="150" y2="100" stroke="#f59e0b" stroke-width="3" opacity="0.7"/>
  <line x1="150" y1="245" x2="150" y2="260" stroke="#f59e0b" stroke-width="3" opacity="0.7"/>
  <line x1="85" y1="180" x2="70" y2="180" stroke="#f59e0b" stroke-width="3" opacity="0.7"/>
  <line x1="215" y1="180" x2="230" y2="180" stroke="#f59e0b" stroke-width="3" opacity="0.7"/>
  <line x1="105" y1="135" x2="94" y2="124" stroke="#f59e0b" stroke-width="3" opacity="0.5"/>
  <line x1="195" y1="225" x2="206" y2="236" stroke="#f59e0b" stroke-width="3" opacity="0.5"/>
  <line x1="195" y1="135" x2="206" y2="124" stroke="#f59e0b" stroke-width="3" opacity="0.5"/>
  <line x1="105" y1="225" x2="94" y2="236" stroke="#f59e0b" stroke-width="3" opacity="0.5"/>

  <!-- Solar panels -->
  <g transform="translate(260,140)">
    <!-- Panel 1 -->
    <rect x="0" y="0" width="70" height="50" fill="#1e3a5f" stroke="#4a9edd" stroke-width="1" rx="2"/>
    <line x1="23" y1="0" x2="23" y2="50" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="46" y1="0" x2="46" y2="50" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="17" x2="70" y2="17" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="34" x2="70" y2="34" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <!-- Panel 2 -->
    <rect x="80" y="0" width="70" height="50" fill="#1e3a5f" stroke="#4a9edd" stroke-width="1" rx="2"/>
    <line x1="103" y1="0" x2="103" y2="50" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="126" y1="0" x2="126" y2="50" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="80" y1="17" x2="150" y2="17" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="80" y1="34" x2="150" y2="34" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <!-- Panel 3 -->
    <rect x="0" y="60" width="70" height="50" fill="#1e3a5f" stroke="#4a9edd" stroke-width="1" rx="2"/>
    <line x1="23" y1="60" x2="23" y2="110" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="46" y1="60" x2="46" y2="110" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="77" x2="70" y2="77" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="94" x2="70" y2="94" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <!-- Panel 4 -->
    <rect x="80" y="60" width="70" height="50" fill="#1e3a5f" stroke="#4a9edd" stroke-width="1" rx="2"/>
    <line x1="103" y1="60" x2="103" y2="110" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="126" y1="60" x2="126" y2="110" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="80" y1="77" x2="150" y2="77" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
    <line x1="80" y1="94" x2="150" y2="94" stroke="#4a9edd" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Arrow from panels to inverter -->
  <path d="M440,195 L490,195" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 Z" fill="#f59e0b"/></marker></defs>
  <text x="465" y="188" font-family="Arial,sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">CC</text>

  <!-- Inverter box -->
  <rect x="490" y="165" width="80" height="60" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="530" y="192" font-family="Arial,sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">INVERSOR</text>
  <text x="530" y="208" font-family="Arial,sans-serif" font-size="8" fill="#f59e0b" opacity="0.38" text-anchor="middle">DC → AC</text>

  <!-- Arrow from inverter to transformer -->
  <path d="M570,195 L620,195" stroke="#2aaa60" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr2)"/>
  <defs><marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 Z" fill="#2aaa60"/></marker></defs>
  <text x="595" y="188" font-family="Arial,sans-serif" font-size="8" fill="#2aaa60" text-anchor="middle">CA</text>

  <!-- Transformer box -->
  <rect x="620" y="155" width="90" height="80" rx="4" fill="#1e293b" stroke="#c8621e" stroke-width="2"/>
  <text x="665" y="192" font-family="Arial,sans-serif" font-size="9" fill="#c8621e" text-anchor="middle">TRANSFOR-</text>
  <text x="665" y="206" font-family="Arial,sans-serif" font-size="9" fill="#c8621e" text-anchor="middle">MADOR</text>
  <line x1="635" y1="175" x2="695" y2="175" stroke="#c8621e" stroke-width="0.5" opacity="0.3"/>
  <line x1="635" y1="190" x2="695" y2="190" stroke="#c8621e" stroke-width="0.5" opacity="0.3"/>

  <!-- Arrow up to grid -->
  <path d="M665,155 L665,120" stroke="#2aaa60" stroke-width="2" marker-end="url(#arr3)"/>
  <defs><marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 Z" fill="#2aaa60"/></marker></defs>
  <text x="680" y="140" font-family="Arial,sans-serif" font-size="9" fill="#2aaa60">REDE</text>

  <!-- Ground line -->
  <line x1="100" y1="380" x2="700" y2="380" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
  <rect x="0" y="380" width="800" height="70" fill="#000000" opacity="0.3"/>

  <!-- Title -->
  <text x="400" y="48" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.6">ENERGIA SOLAR FOTOVOLTAICA</text>

  <rect x="0" y="435" width="800" height="15" fill="#f59e0b" opacity="0.7"/>
</svg>
