<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100a18"/>
      <stop offset="100%" style="stop-color:#181020"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Document shape -->
  <rect x="220" y="80" width="220" height="300" rx="4" fill="#1e1e2e" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Folded corner -->
  <polygon points="390,80 440,80 440,130" fill="#12121e"/>
  <polygon points="390,80 440,130 390,130" fill="#2a2a3e" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Document lines -->
  <rect x="240" y="110" width="120" height="10" rx="2" fill="#c8621e" opacity="0.7"/>
  <rect x="240" y="130" width="160" height="6" rx="2" fill="#ffffff" opacity="0.12"/>
  <rect x="240" y="148" width="140" height="6" rx="2" fill="#ffffff" opacity="0.08"/>
  <rect x="240" y="166" width="155" height="6" rx="2" fill="#ffffff" opacity="0.08"/>
  <rect x="240" y="184" width="130" height="6" rx="2" fill="#ffffff" opacity="0.08"/>
  <line x1="240" y1="205" x2="415" y2="205" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <rect x="240" y="220" width="100" height="8" rx="2" fill="#4a9edd" opacity="0.5"/>
  <rect x="240" y="238" width="150" height="6" rx="2" fill="#ffffff" opacity="0.08"/>
  <rect x="240" y="256" width="130" height="6" rx="2" fill="#ffffff" opacity="0.08"/>
  <rect x="240" y="274" width="145" height="6" rx="2" fill="#ffffff" opacity="0.08"/>
  <line x1="240" y1="295" x2="415" y2="295" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <rect x="240" y="310" width="100" height="8" rx="2" fill="#4a9edd" opacity="0.5"/>
  <rect x="240" y="328" width="155" height="6" rx="2" fill="#ffffff" opacity="0.08"/>
  <rect x="240" y="346" width="120" height="6" rx="2" fill="#ffffff" opacity="0.08"/>

  <!-- ABNT stamp/seal -->
  <circle cx="580" cy="225" r="90" fill="none" stroke="#c8621e" stroke-width="3" opacity="0.6"/>
  <circle cx="580" cy="225" r="76" fill="none" stroke="#c8621e" stroke-width="1" opacity="0.3"/>
  <text x="580" y="205" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#c8621e" text-anchor="middle" letter-spacing="3">ABNT</text>
  <text x="580" y="230" font-family="Arial,sans-serif" font-size="11" fill="#c8621e" text-anchor="middle" letter-spacing="2">NBR 5356</text>
  <line x1="540" y1="240" x2="620" y2="240" stroke="#c8621e" stroke-width="1" opacity="0.5"/>
  <text x="580" y="258" font-family="Arial,sans-serif" font-size="9" fill="#c8621e" opacity="0.50" text-anchor="middle" letter-spacing="1">CERTIFICADO</text>

  <!-- INMETRO badge -->
  <rect x="490" y="330" width="180" height="50" rx="4" fill="#1e293b" stroke="#2aaa60" stroke-width="1.5"/>
  <text x="580" y="352" font-family="Arial,sans-serif" font-size="11" fill="#2aaa60" text-anchor="middle" font-weight="bold" letter-spacing="2">INMETRO</text>
  <text x="580" y="370" font-family="Arial,sans-serif" font-size="9" fill="#2aaa60" text-anchor="middle" opacity="0.7">✓ COMPULSÓRIO</text>

  <!-- Checkmark on document -->
  <circle cx="193" cy="225" r="40" fill="#1e293b" stroke="#2aaa60" stroke-width="2"/>
  <path d="M175,225 L188,238 L213,210" stroke="#2aaa60" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="400" y="48" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.6">NORMAS TÉCNICAS ABNT</text>

  <rect x="0" y="435" width="800" height="15" fill="#c8621e" opacity="0.7"/>
