  <path d="M455,231 L458,235 L466,227" stroke="#2aaa60" stroke-width="1.5" fill="none"/>
  <text x="480" y="235" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" opacity="0.50">Ensaios Elétricos</text>

  <circle cx="460" cy="264" r="8" fill="none" stroke="#c8621e" stroke-width="1.5"/>
  <text x="480" y="268" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" opacity="0.38">Buchas e Isoladores</text>

  <circle cx="460" cy="297" r="8" fill="none" stroke="#c8621e" stroke-width="1.5"/>
  <text x="480" y="301" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" opacity="0.38">Sílica Gel</text>

  <circle cx="460" cy="330" r="8" fill="none" stroke="#c8621e" stroke-width="1.5"/>
  <text x="480" y="334" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" opacity="0.38">Temperatura</text>

  <!-- Wrench icon suggestion -->
  <line x1="120" y1="310" x2="280" y2="310" stroke="#c8621e" stroke-width="1" opacity="0.3"/>
  <text x="200" y="360" font-family="Arial,sans-serif" font-size="10" fill="#c8621e" text-anchor="middle" letter-spacing="3" opacity="0.6">MANUTENÇÃO</text>

  <!-- Title -->
  <text x="400" y="48" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.6">MANUTENÇÃO PREVENTIVA</text>

  <rect x="0" y="435" width="800" height="15" fill="#c8621e" opacity="0.7"/>
