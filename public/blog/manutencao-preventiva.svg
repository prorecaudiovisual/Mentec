<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101820"/>
      <stop offset="100%" style="stop-color:#1a1008"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Gear large -->
  <g transform="translate(200,225)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#c8621e" stroke-width="12" opacity="0.6"/>
    <circle cx="0" cy="0" r="30" fill="#c8621e" opacity="0.3"/>
    <circle cx="0" cy="0" r="12" fill="#c8621e" opacity="0.8"/>
    <!-- Teeth -->
    <rect x="-8" y="-95" width="16" height="22" fill="#c8621e" opacity="0.6" rx="2"/>
    <rect x="-8" y="73" width="16" height="22" fill="#c8621e" opacity="0.6" rx="2"/>
    <rect x="73" y="-8" width="22" height="16" fill="#c8621e" opacity="0.6" rx="2"/>
    <rect x="-95" y="-8" width="22" height="16" fill="#c8621e" opacity="0.6" rx="2"/>
    <rect x="50" y="-75" width="16" height="22" fill="#c8621e" opacity="0.5" rx="2" transform="rotate(45)"/>
    <rect x="50" y="-75" width="16" height="22" fill="#c8621e" opacity="0.5" rx="2" transform="rotate(90)"/>
    <rect x="50" y="-75" width="16" height="22" fill="#c8621e" opacity="0.5" rx="2" transform="rotate(135)"/>
    <rect x="50" y="-75" width="16" height="22" fill="#c8621e" opacity="0.5" rx="2" transform="rotate(180)"/>
    <rect x="50" y="-75" width="16" height="22" fill="#c8621e" opacity="0.5" rx="2" transform="rotate(225)"/>
    <rect x="50" y="-75" width="16" height="22" fill="#c8621e" opacity="0.5" rx="2" transform="rotate(270)"/>
    <rect x="50" y="-75" width="16" height="22" fill="#c8621e" opacity="0.5" rx="2" transform="rotate(315)"/>
  </g>

  <!-- Gear small -->
  <g transform="translate(320,165)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="#4a9edd" stroke-width="8" opacity="0.6"/>
    <circle cx="0" cy="0" r="16" fill="#4a9edd" opacity="0.3"/>
    <circle cx="0" cy="0" r="7" fill="#4a9edd" opacity="0.8"/>
    <rect x="-5" y="-56" width="10" height="14" fill="#4a9edd" opacity="0.6" rx="1"/>
    <rect x="-5" y="42" width="10" height="14" fill="#4a9edd" opacity="0.6" rx="1"/>
    <rect x="42" y="-5" width="14" height="10" fill="#4a9edd" opacity="0.6" rx="1"/>
    <rect x="-56" y="-5" width="14" height="10" fill="#4a9edd" opacity="0.6" rx="1"/>
    <rect x="28" y="-50" width="10" height="14" fill="#4a9edd" opacity="0.4" rx="1" transform="rotate(45)"/>
    <rect x="28" y="-50" width="10" height="14" fill="#4a9edd" opacity="0.4" rx="1" transform="rotate(90)"/>
    <rect x="28" y="-50" width="10" height="14" fill="#4a9edd" opacity="0.4" rx="1" transform="rotate(135)"/>
    <rect x="28" y="-50" width="10" height="14" fill="#4a9edd" opacity="0.4" rx="1" transform="rotate(180)"/>
    <rect x="28" y="-50" width="10" height="14" fill="#4a9edd" opacity="0.4" rx="1" transform="rotate(225)"/>
    <rect x="28" y="-50" width="10" height="14" fill="#4a9edd" opacity="0.4" rx="1" transform="rotate(270)"/>
    <rect x="28" y="-50" width="10" height="14" fill="#4a9edd" opacity="0.4" rx="1" transform="rotate(315)"/>
