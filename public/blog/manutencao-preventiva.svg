  <text x="570" y="130" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" opacity="0.38" text-anchor="middle" letter-spacing="2">CHECKLIST</text>
  <line x1="445" y1="140" x2="695" y2="140" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Check items -->
  <circle cx="460" cy="165" r="8" fill="none" stroke="#2aaa60" stroke-width="1.5"/>
  <path d="M455,165 L458,169 L466,161" stroke="#2aaa60" stroke-width="1.5" fill="none"/>
  <text x="480" y="169" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" opacity="0.50">Inspeção Visual</text>

  <circle cx="460" cy="198" r="8" fill="none" stroke="#2aaa60" stroke-width="1.5"/>
  <path d="M455,198 L458,202 L466,194" stroke="#2aaa60" stroke-width="1.5" fill="none"/>
