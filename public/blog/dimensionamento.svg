<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1520"/>
      <stop offset="100%" style="stop-color:#101820"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Triangle / power triangle -->
  <polygon points="200,320 500,320 200,120" fill="none" stroke="#c8621e" stroke-width="2" opacity="0.7"/>
  <!-- kW horizontal -->
  <line x1="200" y1="320" x2="500" y2="320" stroke="#4a9edd" stroke-width="3" opacity="0.9"/>
  <text x="350" y="345" font-family="Arial,sans-serif" font-size="13" fill="#4a9edd" text-anchor="middle" font-weight="bold">kW (Ativa)</text>
  <!-- kVAr vertical -->
  <line x1="200" y1="320" x2="200" y2="120" stroke="#2aaa60" stroke-width="3" opacity="0.9"/>
  <text x="155" y="225" font-family="Arial,sans-serif" font-size="13" fill="#2aaa60" text-anchor="middle" font-weight="bold" transform="rotate(-90,155,225)">kVAr (Reativa)</text>
  <!-- kVA hypotenuse label -->
  <text x="310" y="205" font-family="Arial,sans-serif" font-size="14" fill="#c8621e" text-anchor="middle" font-weight="bold" transform="rotate(-34,310,205)">kVA (Aparente)</text>

  <!-- Angle arc -->
  <path d="M230,320 A30,30 0 0,0 224,294" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="248" y="308" font-family="Arial,sans-serif" font-size="11" fill="#f59e0b">φ</text>

  <!-- Formula box -->
  <rect x="550" y="120" width="200" height="200" rx="6" fill="#ffffff" opacity="0.02" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="650" y="150" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" opacity="0.38" text-anchor="middle" letter-spacing="2">FÓRMULAS</text>
  <line x1="565" y1="160" x2="735" y2="160" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <text x="650" y="185" font-family="monospace,Arial" font-size="12" fill="#c8621e" text-anchor="middle">kVA = kW / cos φ</text>
  <line x1="565" y1="198" x2="735" y2="198" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <text x="650" y="220" font-family="monospace,Arial" font-size="12" fill="#4a9edd" text-anchor="middle">S² = P² + Q²</text>
  <line x1="565" y1="233" x2="735" y2="233" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <text x="650" y="255" font-family="monospace,Arial" font-size="11" fill="#2aaa60" text-anchor="middle">FP = kW / kVA</text>
  <line x1="565" y1="268" x2="735" y2="268" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <text x="650" y="295" font-family="monospace,Arial" font-size="11" fill="#f59e0b" text-anchor="middle">+ 25% margem</text>

  <!-- Step labels -->
  <circle cx="570" cy="350" r="14" fill="#c8621e" opacity="0.8"/>
  <text x="570" y="355" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">1</text>
  <text x="592" y="355" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" opacity="0.50">Levantamento</text>

  <circle cx="690" cy="350" r="14" fill="#4a9edd" opacity="0.8"/>
  <text x="690" y="355" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">2</text>
  <text x="712" y="355" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" opacity="0.50">Cálculo</text>

  <!-- Title -->
  <text x="400" y="48" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.6">DIMENSIONAMENTO DE TRANSFORMADORES</text>

  <rect x="0" y="435" width="800" height="15" fill="#c8621e" opacity="0.7"/>
</svg>
