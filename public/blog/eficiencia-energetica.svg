<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#0d2218"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#c8621e"/>
      <stop offset="100%" style="stop-color:#e8821e"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a7a40"/>
      <stop offset="100%" style="stop-color:#2aaa60"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid -->
  <line x1="100" y1="80" x2="700" y2="80" stroke="#ffffff06" stroke-width="1"/>
  <line x1="100" y1="140" x2="700" y2="140" stroke="#ffffff06" stroke-width="1"/>
  <line x1="100" y1="200" x2="700" y2="200" stroke="#ffffff06" stroke-width="1"/>
  <line x1="100" y1="260" x2="700" y2="260" stroke="#ffffff06" stroke-width="1"/>
  <line x1="100" y1="320" x2="700" y2="320" stroke="#ffffff06" stroke-width="1"/>
  <line x1="100" y1="380" x2="700" y2="380" stroke="#ffffff0a" stroke-width="1.5"/>

  <!-- Axis -->
  <line x1="100" y1="80" x2="100" y2="380" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
  <line x1="100" y1="380" x2="700" y2="380" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Bars: Loss comparison -->
  <!-- Conventional -->
  <rect x="160" y="160" width="80" height="220" fill="url(#bar1)" opacity="0.85" rx="2"/>
  <text x="200" y="150" font-family="Arial,sans-serif" font-size="13" fill="#e8821e" text-anchor="middle" font-weight="bold">100%</text>
  <text x="200" y="408" font-family="Arial,sans-serif" font-size="9" fill="#ffffff" opacity="0.38" text-anchor="middle" letter-spacing="1">CONVENCIONAL</text>

  <!-- Silicon grain oriented -->
  <rect x="300" y="227" width="80" height="153" fill="url(#bar1)" opacity="0.6" rx="2"/>
  <text x="340" y="217" font-family="Arial,sans-serif" font-size="13" fill="#e8821e" text-anchor="middle" font-weight="bold">70%</text>
  <text x="340" y="408" font-family="Arial,sans-serif" font-size="9" fill="#ffffff" opacity="0.38" text-anchor="middle" letter-spacing="1">GRÃO ORIENT.</text>

  <!-- Amorphous -->
  <rect x="440" y="314" width="80" height="66" fill="url(#bar2)" opacity="0.85" rx="2"/>
  <text x="480" y="304" font-family="Arial,sans-serif" font-size="13" fill="#2aaa60" text-anchor="middle" font-weight="bold">30%</text>
  <text x="480" y="408" font-family="Arial,sans-serif" font-size="9" fill="#ffffff" opacity="0.38" text-anchor="middle" letter-spacing="1">AMORFO</text>

  <!-- Efficiency arrow -->
  <path d="M560,350 L620,280 L580,280 L580,240 L640,240 L640,280 L600,280 L640,350 Z" fill="#2aaa60" opacity="0.3"/>
  <text x="600" y="215" font-family="Arial,sans-serif" font-size="10" fill="#2aaa60" text-anchor="middle" letter-spacing="2" opacity="0.8">EFICIÊNCIA</text>
  <text x="600" y="370" font-family="Arial,sans-serif" font-size="9" fill="#ffffff" opacity="0.25" text-anchor="middle" letter-spacing="1">PERDAS NO FERRO</text>

  <!-- Title -->
  <text x="400" y="45" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.6">EFICIÊNCIA ENERGÉTICA</text>

  <!-- Bottom bar -->
  <rect x="0" y="435" width="800" height="15" fill="#c8621e" opacity="0.7"/>
</svg>
