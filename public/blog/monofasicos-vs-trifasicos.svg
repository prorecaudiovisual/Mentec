<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8621e"/>
      <stop offset="100%" style="stop-color:#e8821e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="75" x2="800" y2="75" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="150" x2="800" y2="150" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="225" x2="800" y2="225" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="375" x2="800" y2="375" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="133" y1="0" x2="133" y2="450" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="266" y1="0" x2="266" y2="450" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="450" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="666" y1="0" x2="666" y2="450" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Monofásico: single wave -->
  <path d="M80,225 Q130,145 180,225 Q230,305 280,225" stroke="#c8621e" stroke-width="3" fill="none" opacity="0.9"/>
  <!-- Label -->
  <text x="180" y="340" font-family="Arial,sans-serif" font-size="11" fill="#c8621e" text-anchor="middle" letter-spacing="3" opacity="0.8">MONOFÁSICO</text>
  <!-- Terminal lines -->
  <line x1="80" y1="225" x2="60" y2="225" stroke="#c8621e" stroke-width="2"/>
  <line x1="280" y1="225" x2="300" y2="225" stroke="#c8621e" stroke-width="2"/>

  <!-- VS divider -->
  <rect x="340" y="185" width="120" height="80" rx="4" fill="#c8621e" opacity="0.15"/>
  <text x="400" y="235" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="#c8621e" text-anchor="middle" opacity="0.9">VS</text>

  <!-- Trifásico: three waves -->
  <path d="M500,200 Q533,150 566,200 Q599,250 632,200 Q665,150 698,200" stroke="#4a9edd" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M500,225 Q533,175 566,225 Q599,275 632,225 Q665,175 698,225" stroke="#6abcf5" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M500,250 Q533,200 566,250 Q599,300 632,250 Q665,200 698,250" stroke="#8ad4ff" stroke-width="2.5" fill="none" opacity="0.5"/>
  <text x="599" y="340" font-family="Arial,sans-serif" font-size="11" fill="#4a9edd" text-anchor="middle" letter-spacing="3" opacity="0.8">TRIFÁSICO</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="435" width="800" height="15" fill="url(#accent)" opacity="0.7"/>

  <!-- Title -->
  <text x="400" y="48" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.6">TRANSFORMADORES ELÉTRICOS</text>
  <line x1="160" y1="58" x2="320" y2="58" stroke="#c8621e" stroke-width="1" opacity="0.5"/>
  <line x1="480" y1="58" x2="640" y2="58" stroke="#c8621e" stroke-width="1" opacity="0.5"/>
</svg>
