<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12141a"/>
      <stop offset="100%" style="stop-color:#1a1420"/>
    </linearGradient>
    <linearGradient id="coil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#4b5563"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Core (E-I shape) -->
  <!-- Main vertical core -->
  <rect x="340" y="100" width="120" height="260" fill="url(#core)" rx="3"/>
  <!-- Left leg -->
  <rect x="240" y="100" width="50" height="260" fill="url(#core)" rx="3"/>
  <!-- Right leg -->
  <rect x="510" y="100" width="50" height="260" fill="url(#core)" rx="3"/>
  <!-- Top yoke -->
  <rect x="240" y="100" width="320" height="40" fill="#4b5563" rx="3"/>
  <!-- Bottom yoke -->
  <rect x="240" y="320" width="320" height="40" fill="#4b5563" rx="3"/>

  <!-- Left winding (HV) -->
  <rect x="265" y="155" width="50" height="165" fill="url(#coil)" rx="2" opacity="0.85"/>
  <!-- Winding lines -->
  <line x1="265" y1="170" x2="315" y2="170" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="265" y1="185" x2="315" y2="185" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="265" y1="200" x2="315" y2="200" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="265" y1="215" x2="315" y2="215" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="265" y1="230" x2="315" y2="230" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="265" y1="245" x2="315" y2="245" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="265" y1="260" x2="315" y2="260" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="265" y1="275" x2="315" y2="275" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="265" y1="290" x2="315" y2="290" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="265" y1="305" x2="315" y2="305" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="290" y="340" font-family="Arial,sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" letter-spacing="1">HV</text>

  <!-- Right winding (LV) -->
  <rect x="485" y="155" width="50" height="165" fill="#c8621e" rx="2" opacity="0.75"/>
  <line x1="485" y1="170" x2="535" y2="170" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="485" y1="185" x2="535" y2="185" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="485" y1="200" x2="535" y2="200" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="485" y1="215" x2="535" y2="215" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="485" y1="230" x2="535" y2="230" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="485" y1="245" x2="535" y2="245" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="485" y1="260" x2="535" y2="260" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="485" y1="275" x2="535" y2="275" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="485" y1="290" x2="535" y2="290" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="485" y1="305" x2="535" y2="305" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="510" y="340" font-family="Arial,sans-serif" font-size="9" fill="#c8621e" text-anchor="middle" letter-spacing="1">LV</text>

  <!-- Epoxy glow effect -->
  <ellipse cx="400" cy="225" rx="150" ry="120" fill="#8b5cf6" opacity="0.05"/>

  <!-- Flame X (no fire) shield -->
  <circle cx="150" cy="225" r="55" fill="#1a1420" stroke="#2aaa60" stroke-width="2" opacity="0.8"/>
  <text x="150" y="218" font-family="Arial,sans-serif" font-size="30" fill="#2aaa60" text-anchor="middle" opacity="0.9">🔥</text>
  <line x1="115" y1="190" x2="185" y2="260" stroke="#2aaa60" stroke-width="3" opacity="0.9"/>
  <line x1="185" y1="190" x2="115" y2="260" stroke="#2aaa60" stroke-width="3" opacity="0.9"/>
  <text x="150" y="300" font-family="Arial,sans-serif" font-size="9" fill="#2aaa60" text-anchor="middle" letter-spacing="2">AUTOEXTINGUÍVEL</text>

  <!-- Tags right side -->
  <rect x="620" y="155" width="130" height="28" rx="3" fill="#1e293b"/>
  <text x="685" y="174" font-family="Arial,sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" letter-spacing="1">RESINA EPÓXI</text>
  <rect x="620" y="195" width="130" height="28" rx="3" fill="#1e293b"/>
  <text x="685" y="214" font-family="Arial,sans-serif" font-size="10" fill="#2aaa60" text-anchor="middle" letter-spacing="1">SEM ÓLEO</text>
  <rect x="620" y="235" width="130" height="28" rx="3" fill="#1e293b"/>
  <text x="685" y="254" font-family="Arial,sans-serif" font-size="10" fill="#c8621e" text-anchor="middle" letter-spacing="1">INSTALAÇÃO INTERNA</text>

  <!-- Title -->
  <text x="400" y="55" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.6">TRANSFORMADORES A SECO</text>

  <!-- Bottom bar -->
  <rect x="0" y="435" width="800" height="15" fill="#8b5cf6" opacity="0.7"/>
</svg>
