<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1020"/>
      <stop offset="100%" style="stop-color:#101828"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4a1e"/>
      <stop offset="100%" style="stop-color:#1a2e0e"/>
    </linearGradient>
    <linearGradient id="earth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2b1f"/>
      <stop offset="100%" style="stop-color:#1a120a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- City skyline -->
  <rect x="60" y="180" width="40" height="130" fill="#1a2535"/>
  <rect x="110" y="150" width="60" height="160" fill="#1e2d40"/>
  <rect x="180" y="170" width="35" height="140" fill="#1a2535"/>
  <rect x="225" y="130" width="50" height="180" fill="#222d3e"/>
  <rect x="285" y="160" width="40" height="150" fill="#1a2535"/>
  <!-- Windows -->
  <rect x="70" y="195" width="8" height="8" fill="#f59e0b" opacity="0.4"/>
  <rect x="83" y="195" width="8" height="8" fill="#f59e0b" opacity="0.2"/>
  <rect x="120" y="165" width="8" height="8" fill="#f59e0b" opacity="0.5"/>
  <rect x="135" y="165" width="8" height="8" fill="#f59e0b" opacity="0.3"/>
  <rect x="120" y="185" width="8" height="8" fill="#f59e0b" opacity="0.3"/>
  <rect x="235" y="148" width="8" height="8" fill="#f59e0b" opacity="0.4"/>
  <rect x="252" y="148" width="8" height="8" fill="#f59e0b" opacity="0.2"/>

  <!-- Ground surface -->
  <rect x="0" y="310" width="800" height="18" fill="url(#ground)"/>
  <!-- Sidewalk -->
  <rect x="0" y="310" width="800" height="8" fill="#3a3a3a" opacity="0.8"/>

  <!-- Underground earth -->
  <rect x="0" y="318" width="800" height="132" fill="url(#earth)"/>

  <!-- Underground chamber -->
  <rect x="320" y="330" width="200" height="120" rx="4" fill="#1a1a2e" stroke="#c8621e" stroke-width="2"/>
  <!-- Transformer inside chamber -->
  <rect x="370" y="350" width="100" height="80" rx="3" fill="#2a2a3e" stroke="#c8621e" stroke-width="1.5"/>
  <text x="420" y="390" font-family="Arial,sans-serif" font-size="10" fill="#c8621e" text-anchor="middle">TRAFO</text>
  <text x="420" y="405" font-family="Arial,sans-serif" font-size="8" fill="#c8621e" opacity="0.4" text-anchor="middle">HERMÉTIC</text>

  <!-- Underground cables -->
  <path d="M150,318 L150,380 Q150,390 160,390 L320,390" stroke="#4a9edd" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M150,318 L150,370 Q150,378 160,378 L320,378" stroke="#4a9edd" stroke-width="4" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M520,385 L660,385 Q670,385 670,375 L670,318" stroke="#2aaa60" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>

  <!-- Access hatch on surface -->
  <rect x="390" y="304" width="60" height="10" rx="2" fill="#555" stroke="#888" stroke-width="1"/>
  <text x="420" y="313" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">▬▬▬▬</text>

  <!-- Labels -->
  <text x="420" y="470" font-family="Arial,sans-serif" font-size="10" fill="#c8621e" text-anchor="middle" letter-spacing="2">CÂMARA SUBTERRÂNEA</text>
  <text x="175" y="400" font-family="Arial,sans-serif" font-size="8" fill="#4a9edd" text-anchor="middle" opacity="0.7">CABOS MT</text>
  <text x="645" y="370" font-family="Arial,sans-serif" font-size="8" fill="#2aaa60" text-anchor="middle" opacity="0.7">CABOS BT</text>

  <!-- Invisible network line above -->
  <line x1="60" y1="295" x2="700" y2="295" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="720" y="299" font-family="Arial,sans-serif" font-size="8" fill="#ffffff" opacity="0.19">AÉREO</text>
  <line x1="60" y1="380" x2="160" y2="380" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="720" y="384" font-family="Arial,sans-serif" font-size="8" fill="#ffffff" opacity="0.19">SUBTER.</text>

  <!-- Title -->
  <text x="400" y="48" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.6">DISTRIBUIÇÃO SUBTERRÂNEA</text>

  <rect x="0" y="435" width="800" height="15" fill="#c8621e" opacity="0.7"/>
</svg>
